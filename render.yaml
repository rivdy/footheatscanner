services:
  - type: web
    name: footheatscanner
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn footheatscanner.wsgi:application"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PRODUCTION
        value: "True"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "footheatscanner.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: footheatscanner-db
          property: connectionString

databases:
  - name: footheatscanner-db
    plan: free
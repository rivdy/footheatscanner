{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Foot Heat Scanner{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'css/style.css' %}">

  <style>
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      color: inherit;
    }
    .brand-logo {
      width: 36px;
      height: 36px;
      object-fit: contain;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<header class="top-nav">
  <a href="{% url 'landing' %}" class="brand">
    <img src="{% static 'img/logo.png' %}" alt="Logo" class="brand-logo">
    Thermal Foot Scanner
  </a>
  <nav>
    <a href="{% url 'landing' %}">Home</a>
    <a href="{% url 'scanner' %}">Scan</a>
  </nav>
</header>

{% block content %}{% endblock %}

<footer class="footer">
  <div style="display:flex; align-items:center; gap:8px;">
    <img src="{% static 'img/logo.png' %}" alt="Logo"
         style="width:24px; height:24px; object-fit:contain; border-radius:4px;">
    Thermal Foot Scanner — DPN & PAD Diagnostics
  </div>
  <div class="muted">Visualization tool only. Not a substitute for medical diagnosis.</div>
</footer>

<script src="{% static 'js/script.js' %}"></script>
</body>
</html>
